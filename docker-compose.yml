services:
  api:
    image: oven/bun:1.2
    working_dir: /app
    restart: unless-stopped
    env_file:
      - ./api/.env          # DATABASE_URL, JWT_SECRET etc. do Neon cloud
    environment:
      PORT: 8000
      NODE_ENV: development
    volumes:
      - ./api:/app
    ports:
      - "8000:8000"
    command: sh -c "bun install && bun run migrate && bun run seed && bun --watch src/index.ts"

  front:
    image: node:22-alpine
    working_dir: /app
    restart: unless-stopped
    environment:
      VITE_API_URL: http://api:8000   # dentro do Docker, service name = hostname
    volumes:
      - ./web-garagem:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
