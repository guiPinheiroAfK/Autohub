version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: autohub
      POSTGRES_USER: autohub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-autohub_dev}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autohub"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: oven/bun:1.2
    working_dir: /app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://autohub:${POSTGRES_PASSWORD:-autohub_dev}@db:5432/autohub
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_in_prod_min32chars}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-60m}
      PORT: 8000
      NODE_ENV: development
    volumes:
      - ./api:/app
    ports:
      - "8000:8000"
    command: sh -c "bun install && bun run migrate && bun run seed && bun --watch src/index.ts"

  front:
    image: node:22-alpine
    working_dir: /app
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./web-garagem:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  pg_data:
